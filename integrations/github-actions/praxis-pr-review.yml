# Praxis PR review — automatic, didactic code review on every pull request.
#
# Drop this file into a CONSUMING repository at `.github/workflows/praxis-pr-review.yml`.
# It installs the `praxis` plugin and runs the `/praxis:review-changes` command over the
# PR diff, posting severity-tagged, teaching-oriented findings as a review comment.
#
# Prerequisites in the consuming repo:
#   1. An `ANTHROPIC_API_KEY` repository secret.
#   2. `pull-requests: write` permission (set below) so the action can comment.
#
# This is a TEMPLATE shipped by praxis. It does not run in praxis itself.

name: Praxis PR review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Only review the latest push on a PR; cancel superseded runs.
concurrency:
  group: praxis-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts and bot authors; review human PRs that are ready.
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout (full history for an accurate diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run praxis review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Install the praxis plugin, then run the routing review over the PR diff.
          prompt: |
            /plugin marketplace add marcrabadan/praxis
            /plugin install praxis@praxis
            /praxis:review-changes Review the diff of this pull request
            (base: ${{ github.event.pull_request.base.ref }}). Post the findings as a
            single PR review comment. Be concise; lead with blockers.
